name: CI-ai-microservice-image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-CI:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov httpx

      - name: Run ruff to check code quality
        run: ruff check .

      - name: Test the application with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term

    #   - name: Debug Secrets
    #     env:
    #       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #     run: |
    #       echo "length of SONAR_TOKEN: ${#SONAR_TOKEN}"
    #       if [ -z "$SONAR_TOKEN" ]; then
    #         echo "SONAR_TOKEN missing"
    #         exit 1
    #       fi
    #       echo "SONAR_TOKEN exists"

    #   - name: SonarQube code analysis
    #     uses: SonarSource/sonarqube-scan-action@v6
    #     env:
    #       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #       SONAR_HOST_URL: https://sonarcloud.io

      - name: Login to GitHub GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docker image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "Using repo: $REPO"
          docker build \
            -t ghcr.io/${REPO}/ai-microservice:${{ github.sha }} \
            -t ghcr.io/${REPO}/ai-microservice:latest \
            -f docker/Dockerfile \
            .

      - name: Push docker image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/${REPO}/ai-microservice:${{ github.sha }}
          docker push ghcr.io/${REPO}/ai-microservice:latest

  backend-CD:
    needs: backend-CI
    runs-on: ubuntu-latest
    # Only deploy on a real push to main — never on a pull request build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret missing"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Set image tag in overlay
        working-directory: k8s/overlays/prod
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          kustomize edit set image \
            ai-microservice:local=ghcr.io/${REPO}/ai-microservice:${{ github.sha }}

      - name: Deploy to cluster
        run: kubectl apply -k k8s/overlays/prod

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/ai-microservice \
            -n ai-microservice \
            --timeout=180s

      - name: Show deployed resources
        if: always()
        run: |
          kubectl get pods -n ai-microservice -o wide
          kubectl get svc -n ai-microservice