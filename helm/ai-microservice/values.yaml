replicaCount: 3

image:
  repository: <YOUR_REGISTRY>/ai-microservice
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits: {cpu: 300m, memory: 256Mi}

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

ingress:
  enabled: true
  host: api.example.com
  tls: true
  className: nginx

postgres:
  enabled: true
  storage: 2Gi

env:
  APP_ENV: production
  LOG_LEVEL: info
