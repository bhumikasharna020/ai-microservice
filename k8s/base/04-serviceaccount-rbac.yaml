apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-microservice-sa
  namespace: ai-microservice
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-microservice-role
  namespace: ai-microservice
rules:
  # Principle of least privilege: only what the app genuinely needs.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-microservice-rolebinding
  namespace: ai-microservice
subjects:
  - kind: ServiceAccount
    name: ai-microservice-sa
    namespace: ai-microservice
roleRef:
  kind: Role
  name: ai-microservice-role
  apiGroup: rbac.authorization.k8s.io
